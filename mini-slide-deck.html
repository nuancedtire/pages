<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mini Slide Deck</title><link rel="stylesheet" href="style.css"></head><body><main class="shell"><nav class="nav"><a href="index.html">Home</a><a class="btn" onclick="prev()">← Prev</a><a class="btn" onclick="next()">Next →</a></nav><section class="card slide" id="slide"><div class="kicker">Slide 1 / 5</div><h1 class="big">Heidi fit in one sentence</h1><p class="lead">NHS emergency clinician + clinical AI builder + product/safety mindset.</p></section></main><script>const slides=[['Slide 1 / 5','Heidi fit in one sentence','NHS emergency clinician + clinical AI builder + product/safety mindset.'],['Slide 2 / 5','Why Heidi','Real clinical deployment, not theatre. Documentation burden is a frontline pain I know personally.'],['Slide 3 / 5','Proof I can build','Aide: RAG, citations, feedback, analytics, audit trail. Peerr/Aiigent: LLM clinical workflow features.'],['Slide 4 / 5','Safety maturity','Bounded use, clinician-in-the-loop, auditability, governance, uncertainty-aware design.'],['Slide 5 / 5','Close','I want to write code that lets clinicians be more present with patients.']];let i=0;function render(){document.getElementById('slide').innerHTML=`<div class="kicker">${slides[i][0]}</div><h1 class="big">${slides[i][1]}</h1><p class="lead">${slides[i][2]}</p>`}function next(){i=(i+1)%slides.length;render()}function prev(){i=(i+slides.length-1)%slides.length;render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev();});</script></body></html>
